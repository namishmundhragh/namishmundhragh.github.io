<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B O H - Bylogic Official Hub</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .sharp-edge { border-radius: 0px !important; }
        .inner-glow { box-shadow: inset 0 0 40px rgba(99, 102, 241, 0.1); }
        input::placeholder { color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Helper to safely get icons from the lucide global
        const Icon = ({ name, className }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <i data-lucide={name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase()} className={className}></i>;
        };

        // --- Visual Logic Engine: Sharp Squares Only ---
        const LogicDiagram = ({ turns, theme }) => {
            const dots = Math.min(turns, 12); 
            const colors = {
                emerald: '#10b981', amber: '#f59e0b', indigo: '#6366f1', rose: '#f43f5e', orange: '#fb923c'
            };
            const color = colors[theme] || '#6366f1';

            return (
                <div className="w-full bg-black/60 border-2 border-white/10 p-8 my-8 flex flex-col items-center justify-center relative sharp-edge shadow-2xl overflow-hidden">
                    <div className="absolute top-0 left-0 p-3 opacity-20"><Icon name="Ban" className="w-8 h-8 text-rose-500" /></div>
                    <svg viewBox="0 0 400 80" className="w-full max-w-md h-auto">
                        {Array.from({ length: dots - 1 }).map((_, i) => (
                            <line key={i} x1={50 + i * (300 / (dots - 1))} y1="40" x2={50 + (i + 1) * (300 / (dots - 1))} y2="40" stroke={color} strokeWidth="10" strokeLinecap="square" />
                        ))}
                        {Array.from({ length: dots }).map((_, i) => (
                            <rect key={i} x={40 + i * (300 / (dots - 1))} y="30" width="20" height="20" fill="white" stroke={color} strokeWidth="5" />
                        ))}
                    </svg>
                    <p className="text-[10px] font-black text-white/40 uppercase mt-4 tracking-[0.3em] italic">B O H Linear Projection • No Curves</p>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('menu'); // 'menu', 'exam', 'results'
            const [sessionKey, setSessionKey] = React.useState(0);
            const [userAnswers, setUserAnswers] = React.useState({});
            const [attempted, setAttempted] = React.useState({}); 
            const [timeLeft, setTimeLeft] = React.useState(0); 
            const [config, setConfig] = React.useState({ count: 5, time: 60 });
            const examRef = React.useRef(null);

            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            // --- THE SUPREME SCRAMBLE ENGINE ---
            const questions = React.useMemo(() => {
                const qPool = [];
                const types = ['Square', 'Line', 'Master', 'Numeric', 'Shard'];
                
                for (let i = 0; i < config.count; i++) {
                    const type = types[i % types.length];
                    const isInput = rand(0, 1) === 1; // 50% Random split for MCQ vs Input
                    
                    if (type === 'Square') {
                        const s = rand(4, 15);
                        qPool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'emerald', type: 'Square',
                            q: `A square logical fortress has a Perimeter of ${s*4}m. Calculate the total Area.`,
                            o: shuffle([s*s, s*4, s*2, s*s+8]), a: (s*s).toString(),
                            hint: `Namish Logic: P(${s*4}) ÷ 4 = Side ${s}. Area = ${s} * ${s} = ${s*s}.`
                        });
                    } else if (type === 'Line') {
                        const t = rand(20, 100);
                        qPool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'amber', type: 'Line', visual: t,
                            q: `A Bylogic Path has exactly ${t} sharp pillars (Turns). How many segments (Gaps) exist?`,
                            o: shuffle([t-1, t, t+1, 5]), a: (t-1).toString(),
                            hint: `Namish Logic: Gaps = Turns - 1. ${t} - 1 = ${t-1}.`
                        });
                    } else if (type === 'Master') {
                        const m = rand(5, 12);
                        qPool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'indigo', type: 'Master', visual: m,
                            q: `Find the Master Power Number for a trajectory with ${m} sharp Turns.`,
                            o: shuffle([m*(m-1), m*m, m+m, 100]), a: (m*(m-1)).toString(),
                            hint: `Namish Logic: Master # = Turns × Gaps. ${m} × ${m-1} = ${m*(m-1)}.`
                        });
                    } else if (type === 'Numeric') {
                        const np = rand(4, 10);
                        const nv = Math.pow(2, np);
                        qPool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'orange', type: 'Numeric',
                            q: `Identify the power level (exponent of 2) for an energy shard worth ${nv}.`,
                            o: shuffle([np, np+1, np-1, nv/2]), a: np.toString(),
                            hint: `Namish Logic: Doubling shards are 2 to the power of X. 2^${np} = ${nv}.`
                        });
                    } else {
                        const s_v = rand(6, 13);
                        qPool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'rose', type: 'Square Logic',
                            q: `A square floor has Area=${s_v*s_v}m². How many meters of Perimeter trim is required?`,
                            o: shuffle([s_v*4, s_v*s_v, s_v*2, s_v*s_v-5]), a: (s_v*4).toString(),
                            hint: `Namish Logic: √Area ${s_v*s_v} = Side ${s_v}. P = ${s_v} * 4 = ${s_v*4}.`
                        });
                    }
                }
                return shuffle(qPool); // Scramble question order
            }, [sessionKey, config.count]);

            React.useEffect(() => {
                let timer;
                if (view === 'exam' && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (view === 'exam' && timeLeft === 0) {
                    setView('results');
                }
                return () => clearInterval(timer);
            }, [view, timeLeft]);

            const handleStart = (c, t) => {
                setConfig({ count: c, time: t });
                setTimeLeft(t);
                setUserAnswers({});
                setAttempted({});
                setSessionKey(s => s + 1);
                setView('exam');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAction = (idx, val) => {
                if (attempted[idx]) return;
                setUserAnswers(prev => ({ ...prev, [idx]: val }));
                setAttempted(prev => ({ ...prev, [idx]: true }));
            };

            const score = Object.keys(userAnswers).reduce((acc, k) => {
                const q = questions.find(q => q.id === parseInt(k));
                return acc + (userAnswers[k]?.trim() === q.a ? 1 : 0);
            }, 0);

            const mistakes = Object.keys(attempted).filter(k => {
                const q = questions.find(q => q.id === parseInt(k));
                return (userAnswers[k] || "").trim() !== q.a;
            });

            return (
                <div className="min-h-screen text-white font-sans selection:bg-indigo-500/40">
                    
                    {/* Background Layer */}
                    <div className="fixed inset-0 z-0">
                        <div className="absolute inset-0 bg-gradient-to-br from-indigo-950 via-slate-950 to-black"></div>
                        <div className="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-indigo-600/10 blur-[150px] rounded-full animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] bg-rose-600/10 blur-[150px] rounded-full animate-pulse delay-1000"></div>
                    </div>

                    <header className="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-2xl border-b border-white/10 px-10 py-6 flex justify-between items-center shadow-2xl">
                        <div className="flex items-center gap-5 cursor-pointer group" onClick={() => setView('menu')}>
                            <div className="w-14 h-14 bg-white flex items-center justify-center font-black shadow-2xl rounded-none transform group-hover:rotate-90 transition-all">
                                <span className="text-slate-900 text-3xl italic font-bold">B</span>
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter leading-none italic uppercase">B O H</h1>
                                <p className="text-[10px] font-bold uppercase tracking-[0.5em] text-indigo-400 mt-2">Official Hub</p>
                            </div>
                        </div>
                        {view === 'exam' && (
                            <div className="px-8 py-3 border-2 font-mono text-3xl font-black sharp-edge transition-all bg-white/5 border-white/10 shadow-2xl">
                                {Math.floor(timeLeft/60)}:{String(timeLeft % 60).padStart(2, '0')}
                            </div>
                        )}
                    </header>

                    <main className="relative z-10 max-w-7xl mx-auto px-8 pt-48 pb-60 space-y-40">
                        
                        {view === 'menu' && (
                            <>
                                {/* --- CREATOR LEGEND --- */}
                                <section className="bg-white/5 backdrop-blur-3xl p-16 border-2 border-white/10 shadow-2xl sharp-edge relative overflow-hidden group">
                                    <div className="flex flex-col lg:flex-row items-center gap-16 mb-16">
                                        <div className="relative shrink-0">
                                            <div className="w-80 h-80 bg-gradient-to-tr from-rose-500 via-indigo-600 to-emerald-400 p-2 rotate-3 shadow-[0_0_80px_rgba(79,70,229,0.3)]">
                                                <div className="w-full h-full bg-slate-900 flex items-center justify-center text-[10rem] border border-white/10 shadow-inner font-bold">🧒</div>
                                            </div>
                                            <div className="absolute -bottom-8 -right-8 bg-amber-400 p-8 border-4 border-white animate-bounce sharp-edge shadow-2xl"><Icon name="Star" className="w-16 h-16 text-white fill-white" /></div>
                                        </div>
                                        <div className="flex-1 text-center lg:text-left space-y-6">
                                            <span className="px-8 py-2 bg-indigo-600 text-white text-[11px] font-black uppercase tracking-[0.4em] shadow-xl inline-block">Master Creator</span>
                                            <h2 className="text-8xl font-black text-white tracking-tighter leading-[0.8] mb-4">Namish Mundhra</h2>
                                            <div className="flex flex-wrap gap-6 mt-10 justify-center lg:justify-start">
                                                <div className="flex items-center gap-4 bg-white/5 px-8 py-4 border border-white/10 text-[10px] font-black text-emerald-400 uppercase tracking-widest italic sharp-edge"><Icon name="School" className="w-5 h-5"/> Future Kids School</div>
                                                <div className="flex items-center gap-4 bg-white/5 px-8 py-4 border border-white/10 text-[10px] font-black text-rose-400 uppercase tracking-widest italic sharp-edge"><Icon name="Gift" className="w-5 h-5"/> Dec 27 Birthday</div>
                                                <div className="flex items-center gap-4 bg-white/5 px-6 py-3 border border-white/10 text-[10px] font-black text-indigo-400 uppercase tracking-widest italic sharp-edge"><Icon name="Rocket" className="w-5 h-5"/> 4th to 5th Grade</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid lg:grid-cols-2 gap-16 border-t-2 border-white/10 pt-20 text-2xl leading-relaxed italic text-slate-200">
                                        <div className="space-y-10 font-medium">
                                            <p className="text-white drop-shadow-lg underline decoration-indigo-500/50 underline-offset-8 font-bold italic">At nine years old, **Namish Mundhra**, a student at **Future Kids School**, identified a glitch in mathematics: circles were chaotic, infinite loops that lacked definitive logic. He declared a total war on curves, building the B O H as a sanctuary for ninety-degree logic and pure lines.</p>
                                            <p>Born on the **27th of December** near Christmas, Namish brought the gift of clarity to numbers. Standing on the threshold of the 5th grade, he constructed a cognitive system that processes logic like an organic supercomputer.</p>
                                            <p>Namish believes that "Logic is the shortest distance between a question and the truth." In his world, the messy complexity of traditional math is deleted, replaced by the perfect symmetry of squares.</p>
                                        </div>
                                        <div className="space-y-10 text-xl text-slate-400 font-bold border-l-8 border-indigo-600/20 pl-16">
                                            <p>The Creator views every mathematical problem as a "Logic Shard." By utilizing the Square-Area Bridge and Turn Dynamics, he can process complex trajectories in milliseconds. His hub is not just a site; it is a training ground for precision and mental velocity.</p>
                                            <p>His philosophy extends beyond numbers into architecture. Every bridge, robot, and fortress in this hub is anchored by the "Law of Turns," ensuring that no curve clouds the path to a solution.</p>
                                            <p>Today, Namish invites you to face the **Supreme Scramble**. He believes true genius is defined by speed and accuracy. Every mistake in the Hub is tracked, analyzed, and corrected by Namish’s specific linear logic.</p>
                                            <p>Welcome to the sanctuary of Namish Mundhra. In this world, logic is absolute, squares are perfect, and curves are deleted. Prepare for Audit.</p>
                                        </div>
                                    </div>
                                </section>

                                {/* --- ACADEMY LAWS --- */}
                                <section className="bg-white/5 backdrop-blur-xl p-16 border-2 border-white/10 shadow-2xl sharp-edge">
                                    <div className="flex items-center gap-8 mb-24 border-b-4 border-white/10 pb-12">
                                        <div className="p-8 bg-indigo-600 rotate-6 shadow-2xl animate-pulse"><Icon name="GraduationCap" className="w-20 h-20 text-white" /></div>
                                        <h3 className="text-[7rem] font-black tracking-tighter uppercase italic leading-none">The Academy</h3>
                                    </div>

                                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
                                        <div className="bg-rose-500/20 p-16 border-4 border-rose-500 shadow-2xl col-span-full transform hover:-translate-y-4 transition-all sharp-edge">
                                            <div className="flex items-center gap-12 mb-10 text-rose-500">
                                                <Icon name="Ban" className="w-24 h-24" />
                                                <h4 className="text-[6rem] font-black text-white uppercase tracking-tighter italic">LAW ZERO: NO CIRCLES</h4>
                                            </div>
                                            <p className="text-rose-100 text-5xl font-black italic leading-tight">"Curves are messy lies. We only believe in corners and sharp edges. If it curves, it isn't Bylogic."</p>
                                        </div>

                                        {[
                                            { id: '01', t: 'Square Rule', c: 'emerald', r: 'Side = P÷4 or √Area.', e: '20m fence → Side 5 → Area 25m².', icon: <Icon name="Square" className="w-12 h-12"/> },
                                            { id: '02', t: 'Turn Power', c: 'amber', r: 'Gaps = Turns - 1.', e: '10 Pillars hold exactly 9 segments.', icon: <Icon name="MoveRight" className="w-12 h-12"/> },
                                            { id: '03', t: 'Master Logic', c: 'indigo', r: 'Turns × Gaps.', e: '5 Turns × 4 Gaps = 20 Power.', icon: <Icon name="Target" className="w-12 h-12"/> },
                                            { id: '04', t: 'Numeric Rule', c: 'orange', r: 'Doubling (2^X).', e: 'Shards grow: 2, 4, 8, 16, 32...', icon: <Icon name="Hash" className="w-12 h-12"/> },
                                            { id: '05', t: 'Shard Combo', c: 'rose', r: 'Biggest Blocks First.', e: '14 Power = Blocks (8, 4, 2).', icon: <Icon name="Boxes" className="w-12 h-12"/> },
                                            { id: '06', t: 'Linear Speed', c: 'emerald', r: 'Logic / Time.', e: 'Fast logic beats slow math.', icon: <Icon name="Rocket" className="w-12 h-12"/> },
                                            { id: '07', t: 'Precision Lock', c: 'amber', r: 'Exact Match Only.', e: 'Typed shards must be perfect.', icon: <Icon name="Keyboard" className="w-12 h-12"/> },
                                            { id: '08', t: 'Fault Mapping', c: 'indigo', r: 'Instant Feedback.', e: 'Mistakes reveal the logic path.', icon: <Icon name="ShieldCheck" className="w-12 h-12"/> }
                                        ].map(rule => (
                                            <div key={rule.id} className={`bg-${rule.c}-500/10 p-12 border-4 border-${rule.c}-500 shadow-xl sharp-edge hover:scale-105 transition-all group`}>
                                                <div className="flex items-center gap-6 mb-8">
                                                    <div className="p-4 bg-white text-slate-900 group-hover:rotate-12 transition-transform sharp-edge">{rule.icon}</div>
                                                    <h4 className="text-4xl font-black text-white uppercase tracking-tighter italic leading-none">{rule.t}</h4>
                                                </div>
                                                <p className="text-white font-black opacity-80 mb-10 text-2xl italic leading-relaxed">{rule.r}</p>
                                                <div className="bg-black/60 p-8 border border-white/10 text-xl font-black text-white italic flex items-center gap-6 shadow-inner"><Icon name="Compass" className="w-10 h-10 text-white/40" /> {rule.e}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* --- TEST SELECT --- */}
                                <section className="space-y-12">
                                    <div className="flex items-center gap-6 mb-12"><Icon name="Timer" className="w-16 h-16 text-indigo-400" /><h3 className="text-7xl font-black tracking-tighter uppercase italic text-white leading-none">Enter Test</h3></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                                        {[
                                            { label: 'Sprint', count: 5, time: 60, icon: "Zap" },
                                            { label: 'Blitz', count: 10, time: 300, icon: "Binary" },
                                            { label: 'Logic Shifter', count: 15, time: 900, icon: "Rocket" },
                                            { label: 'Creator Challenge', count: 20, time: 600, icon: "Cpu" },
                                            { label: 'Marathon', count: 50, time: 1500, icon: "Trophy" },
                                            { label: 'Ultimate Legend', count: 100, time: 3600, icon: "ShieldCheck" }
                                        ].map((opt, i) => (
                                            <button key={i} onClick={() => handleStart(opt.count, opt.time)} className="bg-white/5 border-4 border-white/10 p-12 text-left hover:bg-white/10 transition-all sharp-edge group relative overflow-hidden shadow-2xl">
                                                <div className="absolute top-0 right-0 p-8 opacity-5 font-black text-[6rem] italic leading-none">{opt.count}</div>
                                                <div className="p-5 bg-indigo-600 w-fit mb-10 group-hover:scale-110 transition-transform sharp-edge">
                                                    <Icon name={opt.icon} className="w-10 h-10 text-white" />
                                                </div>
                                                <h4 className="text-5xl font-black uppercase italic mb-6 leading-none">{opt.label}</h4>
                                                <div className="flex items-center gap-6 text-slate-400 font-black uppercase text-sm italic"><Icon name="Clock" className="w-6 h-6" /> {Math.floor(opt.time/60)} Min Challenge</div>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            </>
                        )}

                        {view === 'exam' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-20">
                                <div className="lg:col-span-8 space-y-24">
                                    {questions.map((q, i) => {
                                        const userVal = (userAnswers[q.id] || "").trim();
                                        const isDone = attempted[q.id];
                                        const isCorrect = userVal === q.a;

                                        return (
                                            <div key={i} id={`q-${q.id}`} className={`p-2 transition-all duration-700 shadow-2xl sharp-edge ${isDone ? (isCorrect ? 'bg-emerald-500 shadow-[0_0_100px_rgba(16,185,129,0.4)]' : 'bg-rose-500 shadow-[0_0_100px_rgba(244,63,94,0.4)]') : `bg-white/10 hover:bg-white/15`}`}>
                                                <div className="bg-slate-900/95 p-16 h-full border border-white/10 shadow-inner relative overflow-hidden sharp-edge">
                                                    <div className="flex justify-between mb-12 border-b border-white/5 pb-10 opacity-30">
                                                        <span className="text-sm font-black uppercase italic">{q.mode} ${i+1} • ${q.type}</span>
                                                        {isDone && <Icon name={isCorrect ? "CheckCircle" : "XCircle"} className="w-8 h-8" />}
                                                    </div>
                                                    {q.visual && <LogicDiagram turns={q.visual} theme={q.theme} />}
                                                    <p className="text-6xl font-black italic leading-[1.1] text-white tracking-tighter mb-16 underline decoration-white/5 underline-offset-[20px]">{q.q}</p>

                                                    {q.mode === 'MCQ' ? (
                                                        <div className="grid md:grid-cols-2 gap-10">
                                                            {q.o.map((opt, oi) => {
                                                                const sel = userVal === opt.toString();
                                                                const corr = opt.toString() === q.a;
                                                                let style = "bg-white/5 border-4 border-white/10 hover:bg-white/10";
                                                                if (isDone) {
                                                                    if (corr) style = "bg-emerald-600 border-emerald-300 scale-[1.08] z-10 shadow-2xl";
                                                                    else if (sel) style = "bg-rose-700 border-rose-500 opacity-90 scale-95";
                                                                    else style = "opacity-10 grayscale blur-[2px]";
                                                                }
                                                                return <button key={oi} disabled={isDone} onClick={() => handleAction(q.id, opt.toString())} className={`py-12 px-14 text-5xl font-black text-left transition-all sharp-edge border-4 ${style}`}>{opt}</button>
                                                            })}
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-12">
                                                            <input 
                                                                type="text" disabled={isDone} value={userAnswers[q.id] || ""}
                                                                onChange={(e) => setUserAnswers(prev => ({...prev, [q.id]: e.target.value}))}
                                                                onKeyDown={(e) => e.key === 'Enter' && handleAction(q.id, userAnswers[q.id])}
                                                                placeholder="Input logic result..."
                                                                className={`w-full bg-white/5 border-b-[16px] p-16 text-[10rem] font-black outline-none transition-all placeholder:text-white/5 sharp-edge ${isDone ? (isCorrect ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400') : 'border-white/20 focus:border-indigo-500'}`}
                                                            />
                                                            {!isDone && <button onClick={() => handleAction(q.id, userAnswers[q.id])} className="w-full bg-indigo-600 py-10 font-black uppercase italic text-4xl hover:bg-white hover:text-indigo-600 transition-all sharp-edge flex items-center justify-center gap-6"><Icon name="ShieldCheck" className="w-10 h-10"/> Verify Shard</button>}
                                                        </div>
                                                    )}

                                                    {/* --- IMMEDIATE CORRECTION PATH --- */}
                                                    {isDone && !isCorrect && (
                                                        <div className="mt-16 p-20 bg-rose-500/10 border-4 border-rose-500/40 animate-in slide-in-from-top-10 sharp-edge">
                                                            <div className="flex items-center gap-8 text-rose-400 mb-10 border-b border-rose-900/50 pb-8"><Icon name="AlertCircle" className="w-16 h-16" /><p className="text-4xl font-black uppercase tracking-[0.5em] italic">Correction Path</p></div>
                                                            <p className="text-[8rem] font-black italic text-rose-100 leading-none mb-12 uppercase tracking-tighter">"VALUE: {q.a}"</p>
                                                            <p className="text-5xl text-white/50 font-black italic leading-tight">{q.hint}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })}
                                    <div className="text-center py-40">
                                        <button onClick={() => { setView('results'); window.scrollTo({top:0, behavior:'smooth'}); }} className="bg-white text-slate-950 px-52 py-20 text-[6rem] font-black uppercase italic shadow-[0_0_150px_rgba(255,255,255,0.4)] hover:scale-110 active:scale-95 transition-all leading-none sharp-edge flex items-center justify-center gap-16 mx-auto shadow-2xl">Final Submit <Icon name="Trophy" className="w-32 h-32" /></button>
                                    </div>
                                </div>

                                <div className="lg:col-span-4 sticky top-48 h-fit space-y-12 animate-in slide-in-from-right-20 duration-1000">
                                    <div className="bg-slate-900/90 backdrop-blur-3xl p-16 border-b-[40px] border-rose-600 shadow-[0_50px_100px_rgba(0,0,0,0.8)] border border-white/10 sharp-edge">
                                        <div className="grid grid-cols-3 gap-6">
                                            {questions.map((qObj, idx) => {
                                                const done = attempted[qObj.id];
                                                const corr = userAnswers[qObj.id] === qObj.a;
                                                return <button key={idx} onClick={() => document.getElementById(`q-${qObj.id}`).scrollIntoView({behavior:'smooth', block:'center'})} className={`w-full aspect-square text-4xl font-black border-8 transition-all flex items-center justify-center sharp-edge ${done ? (corr ? 'bg-emerald-500 border-emerald-400' : 'bg-rose-600 border-rose-400 animate-pulse') : 'bg-white/5 border-white/10 hover:border-indigo-500'}`}>{idx+1}</button>
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="text-center py-40 animate-in zoom-in duration-1000 max-w-7xl mx-auto bg-slate-900 border-t-[80px] border-indigo-600 p-32 shadow-[0_0_300px_rgba(79,70,229,0.5)] sharp-edge">
                                <div className="text-[25rem] mb-20 animate-bounce font-bold italic leading-none">{score >= (config.count * 0.8) ? '👑' : '⏳'}</div>
                                <h2 className="text-[10rem] font-black text-white mb-20 tracking-tighter uppercase italic leading-none italic drop-shadow-2xl">Audit Complete</h2>
                                <div className="grid grid-cols-2 gap-20 mb-32">
                                    <div className="bg-emerald-600 p-24 border-8 border-emerald-400 transform -rotate-3 hover:rotate-0 transition-all shadow-2xl"><p className="text-[18rem] font-black italic leading-none italic">{score}/{config.count}</p></div>
                                    <div className="bg-rose-600 p-24 border-8 border-rose-400 transform rotate-3 hover:rotate-0 transition-all shadow-2xl"><p className="text-[18rem] font-black italic leading-none italic">{mistakes.length}</p></div>
                                </div>
                                <button onClick={() => setView('menu')} className="w-full bg-white text-slate-950 py-24 text-[10rem] font-black uppercase italic hover:bg-indigo-500 hover:text-white transition-all sharp-edge shadow-2xl flex items-center justify-center gap-20"><Icon name="RotateCcw" className="w-40 h-40"/> Main Menu</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
