<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B O H - Bylogic Official Hub</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (React Version) -->
    <script src="https://unpkg.com/lucide-react"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Correctly accessing Lucide React Icons from the global Lucide object
        const { 
            Square, Trophy, CheckCircle, XCircle, AlertCircle, RefreshCw, 
            Clock, Zap, RotateCcw, Star, GraduationCap, ListChecks, 
            Ban, ShieldCheck, Play, School, Gift, ArrowRight, 
            Binary, Cpu, Palette, Compass, Rocket, Timer, List, Keyboard, Pencil,
            Target, Boxes, MoveRight, Layers, Hash
        } = lucide;

        // --- Visual Logic Engine: Sharp Squares Only ---
        const LogicDiagram = ({ turns, theme }) => {
            const dots = Math.min(turns, 12); 
            const colors = {
                emerald: '#10b981', amber: '#f59e0b', indigo: '#6366f1', rose: '#f43f5e', orange: '#fb923c'
            };
            const color = colors[theme] || '#6366f1';

            return (
                <div className="w-full bg-black/60 border-2 border-white/10 p-8 my-8 flex flex-col items-center justify-center relative rounded-none shadow-2xl overflow-hidden">
                    <div className="absolute top-0 left-0 p-3 opacity-20"><Ban className="w-8 h-8 text-rose-500" /></div>
                    <svg viewBox="0 0 400 80" className="w-full max-w-md h-auto">
                        {Array.from({ length: dots - 1 }).map((_, i) => (
                            <line key={i} x1={50 + i * (300 / (dots - 1))} y1="40" x2={50 + (i + 1) * (300 / (dots - 1))} y2="40" stroke={color} strokeWidth="10" strokeLinecap="square" />
                        ))}
                        {Array.from({ length: dots }).map((_, i) => (
                            <rect key={i} x={40 + i * (300 / (dots - 1))} y="30" width="20" height="20" fill="white" stroke={color} strokeWidth="5" />
                        ))}
                    </svg>
                    <p className="text-[10px] font-black text-white/40 uppercase mt-4 tracking-[0.3em] italic">B O H Linear Projection • No Curves</p>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('menu'); 
            const [sessionKey, setSessionKey] = React.useState(0);
            const [userAnswers, setUserAnswers] = React.useState({});
            const [attempted, setAttempted] = React.useState({}); 
            const [showResults, setShowResults] = React.useState(false);
            const [timeLeft, setTimeLeft] = React.useState(0); 
            const [config, setConfig] = React.useState({ count: 5, time: 60 });
            const examRef = React.useRef(null);

            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            const shuffleArray = (arr) => [...arr].sort(() => Math.random() - 0.5);

            const questions = React.useMemo(() => {
                const pool = [];
                const logicTypes = ['Square', 'Line', 'Master', 'Numeric', 'Ads'];
                
                for (let i = 0; i < config.count; i++) {
                    const type = logicTypes[rand(0, logicTypes.length - 1)];
                    const isInput = rand(0, 1) === 1;
                    
                    if (type === 'Square') {
                        const s = rand(5, 18);
                        const mode = rand(0, 1);
                        if (mode === 0) {
                            pool.push({
                                id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'emerald', type: 'Square Area',
                                q: `Namish identifies a square logic-cell with P=${s*4}m. Calculate the Area.`,
                                o: shuffleArray([s*s, s*4, s*2, s*s+10]), a: (s*s).toString(),
                                hint: `Namish Logic: Perimeter ${s*4} ÷ 4 = Side ${s}. Area = ${s}² = ${s*s}.`
                            });
                        } else {
                            pool.push({
                                id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'emerald', type: 'Square Perimeter',
                                q: `A square logic-shard has Area=${s*s}m². How many meters of straight Perimeter does Namish need?`,
                                o: shuffleArray([s*4, s*s, s*2, s*10]), a: (s*4).toString(),
                                hint: `Namish Logic: √Area ${s*s} = Side ${s}. Perimeter = ${s} × 4 = ${s*4}.`
                            });
                        }
                    } else if (type === 'Line') {
                        const t = rand(15, 99);
                        pool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'amber', type: 'Linear Path', visual: 8,
                            q: `A B O H Bridge at Future Kids School has exactly ${t} sharp pillars (Turns). How many segments (Gaps) exist?`,
                            o: shuffleArray([t-1, t, t+1, 0]), a: (t-1).toString(),
                            hint: `Namish Logic: Gaps are always one less than Turns. ${t} - 1 = ${t-1}.`
                        });
                    } else if (type === 'Master') {
                        const m = rand(5, 13);
                        pool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'indigo', type: 'Master Power', visual: m,
                            q: `A logic-shifter makes exactly ${m} sharp Turns. Calculate the Master Power Number.`,
                            o: shuffleArray([m*(m-1), m*m, m+m, 120]), a: (m*(m-1)).toString(),
                            hint: `Namish Logic: Master # = Turns × Gaps. ${m} × ${m-1} = ${m*(m-1)}.`
                        });
                    } else if (type === 'Numeric') {
                        const np = rand(4, 9);
                        const nv = Math.pow(2, np);
                        pool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'orange', type: 'Energy Shard',
                            q: `Namish finds a shard with energy value ${nv}. What is its Ads Power level (2 to what power)?`,
                            o: shuffleArray([np, np+1, np-1, 10]), a: np.toString(),
                            hint: `Namish Logic: Doubling shards grow by powers of 2. 2^${np} = ${nv}.`
                        });
                    } else {
                        const b = [32, 16, 8, 4, 2];
                        const combo = shuffleArray(b).slice(0, rand(2, 3));
                        const sum = combo.reduce((a, b) => a + b, 0);
                        pool.push({
                            id: i, mode: isInput ? 'INPUT' : 'MCQ', theme: 'rose', type: 'Shard Ads',
                            q: `Calculate the sum of energy blocks: ${combo.join(', ')}.`,
                            o: shuffleArray([sum, sum+2, sum-1, sum*2]), a: sum.toString(),
                            hint: `Namish Logic: Combine the linear values. Total = ${sum}.`
                        });
                    }
                }
                return shuffleArray(pool);
            }, [sessionKey, config.count]);

            React.useEffect(() => {
                let timer;
                if (view === 'exam' && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (view === 'exam' && timeLeft === 0) {
                    setView('results');
                    setShowResults(true);
                }
                return () => clearInterval(timer);
            }, [view, timeLeft]);

            const handleStart = (c, t) => {
                setConfig({ count: c, time: t });
                setTimeLeft(t);
                setUserAnswers({});
                setAttempted({});
                setSessionKey(s => s + 1);
                setView('exam');
                setShowResults(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const lockInAnswer = (idx, val) => {
                if (attempted[idx]) return;
                setUserAnswers(prev => ({ ...prev, [idx]: val }));
                setAttempted(prev => ({ ...prev, [idx]: true }));
            };

            const score = Object.keys(userAnswers).reduce((acc, k) => {
                const qIdx = questions.findIndex(q => q.id === parseInt(k));
                return acc + (userAnswers[k]?.trim() === questions[qIdx].a ? 1 : 0);
            }, 0);

            const mistakes = Object.keys(attempted).filter(k => {
                const qIdx = questions.findIndex(q => q.id === parseInt(k));
                return (userAnswers[k] || "").trim() !== questions[qIdx].a;
            });

            return (
                <div className="min-h-screen bg-slate-950 text-white font-sans selection:bg-rose-500/40 overflow-x-hidden">
                    
                    <div className="fixed inset-0 z-0">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-indigo-950 via-slate-950 to-black"></div>
                        <div className="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-indigo-600/10 blur-[150px] rounded-full animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] bg-rose-600/10 blur-[150px] rounded-full animate-pulse delay-1000"></div>
                    </div>

                    <header className={`fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-2xl border-b border-white/10 px-10 py-6 flex justify-between items-center shadow-2xl`}>
                        <div className="flex items-center gap-5 cursor-pointer group" onClick={() => setView('menu')}>
                            <div className="w-16 h-16 bg-white flex items-center justify-center font-black rounded-none transform group-hover:rotate-90 transition-all">
                                <span className="text-slate-900 text-3xl italic font-bold">B</span>
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter leading-none italic uppercase">B O H</h1>
                                <p className="text-[10px] font-bold uppercase tracking-[0.5em] text-indigo-400 mt-2">Bylogic Official Hub</p>
                            </div>
                        </div>
                        {view === 'exam' && (
                            <div className={`px-10 py-3 border-4 font-mono text-4xl font-black rounded-none transition-all ${timeLeft < 20 ? 'bg-rose-600 border-rose-400 animate-pulse' : 'bg-white/5 border-white/10 shadow-2xl'}`}>
                                {Math.floor(timeLeft/60)}:{String(timeLeft % 60).padStart(2, '0')}
                            </div>
                        )}
                    </header>

                    <main className="relative z-10 max-w-7xl mx-auto px-8 pt-48 pb-60 space-y-40">
                        {view === 'menu' && (
                            <>
                                {/* --- CREATOR LEGEND: NAMISH MUNDRA --- */}
                                <section className="bg-white/5 backdrop-blur-3xl p-16 border-2 border-white/10 shadow-2xl rounded-none relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-12 opacity-10 group-hover:scale-125 transition-transform duration-1000"><Palette className="w-[30rem] h-[30rem] text-white" /></div>
                                    
                                    <div className="flex flex-col lg:flex-row items-center gap-16 mb-20">
                                        <div className="relative shrink-0">
                                            <div className="w-80 h-80 bg-gradient-to-tr from-rose-500 via-indigo-600 to-emerald-400 p-2 rotate-3 shadow-[0_0_100px_rgba(79,70,229,0.4)]">
                                                <div className="w-full h-full bg-slate-900 flex items-center justify-center text-[10rem] border border-white/10 shadow-inner font-bold">🧒</div>
                                            </div>
                                            <div className="absolute -bottom-8 -right-8 bg-amber-400 p-8 border-4 border-white animate-bounce shadow-2xl rounded-none"><Star className="w-16 h-16 text-white fill-white" /></div>
                                        </div>
                                        <div className="flex-1 text-center lg:text-left space-y-6">
                                            <span className="px-8 py-2 bg-indigo-600 text-white text-[11px] font-black uppercase tracking-[0.4em] shadow-xl inline-block">Master Creator & Architect</span>
                                            <h2 className="text-[9rem] font-black text-white tracking-tighter leading-[0.8] mb-4">Namish Mundra</h2>
                                            <div className="flex flex-wrap gap-6 mt-10 justify-center lg:justify-start">
                                                <div className="flex items-center gap-4 bg-white/5 px-8 py-4 border border-white/10 text-xs font-black text-emerald-400 uppercase tracking-widest italic shadow-2xl"><School className="w-6 h-6"/> Future Kids School</div>
                                                <div className="flex items-center gap-4 bg-white/5 px-8 py-4 border border-white/10 text-xs font-black text-rose-400 uppercase tracking-widest italic shadow-2xl"><Gift className="w-6 h-6"/> Dec 27th Birthday</div>
                                                <div className="flex items-center gap-4 bg-white/5 px-6 py-3 border border-white/10 text-[10px] font-black text-indigo-400 uppercase tracking-widest italic shadow-xl"><Rocket className="w-5 h-5"/> 4th to 5th Grade</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid lg:grid-cols-2 gap-16 border-t-2 border-white/10 pt-20 text-2xl leading-relaxed italic text-slate-200">
                                        <div className="space-y-12 font-medium">
                                            <p className="text-white drop-shadow-lg underline decoration-indigo-500/50 underline-offset-8">At just nine years old, **Namish Mundra**, a visionary student at **Future Kids School**, identified a fundamental glitch in reality. While his peers accepted the curves of traditional geometry, Namish identified circles as chaotic, infinite loops that lacked definitive truth—sparking a total war on curves and a commitment to the "Pure Line."</p>
                                            <p>Born on the **27th of December**, arriving like a gift of clarity just as the world celebrates the winter season, Namish brought a unique perspective to numbers. He believes that logic should be as sharp as a ninety-degree corner and as efficient as a straight path.</p>
                                            <p>Standing on the threshold of the **5th grade**, Namish has dedicated his time to constructing the **Bylogic Official Hub (B O H)**—a digital temple where truth is anchored in the absolute symmetry of squares. His mission is to train the next generation of high-speed thinkers.</p>
                                        </div>
                                        <div className="space-y-12 text-xl text-slate-400 font-bold border-l-8 border-indigo-600/20 pl-16">
                                            <p>The Creator’s journey began in the classrooms of Future Kids School, where he first drafted the **Law of Zero Curves**. He realized that the shortest path between a question and an answer is always a straight line—never a circle. This philosophy transformed his mental processing into that of a organic supercomputer.</p>
                                            <p>Namish views every mathematical problem as a "Logic Shard." By utilizing the Square-Area Bridge and Turn Dynamics, he can process complex trajectories in milliseconds. His hub is not just a website; it is a training ground for precision and mental velocity.</p>
                                            <p>Today, the Founder invites you to face the **Omni-Blitz**. He believes that true genius is not just about knowing the answer, but about the speed at which you arrive there. Every mistake in the Hub is tracked, analyzed, and corrected by Namish’s specific linear logic.</p>
                                            <p>Welcome to the Hub. In Namish Mundra's world, logic is absolute, squares are perfect, and curves are deleted. Prepare for the ultimate mental audit.</p>
                                        </div>
                                    </div>
                                </section>

                                {/* --- ACADEMY LAWBOOK --- */}
                                <section className="bg-white/5 backdrop-blur-xl p-16 border-2 border-white/10 shadow-2xl rounded-none">
                                    <div className="flex items-center gap-8 mb-24 border-b-4 border-white/10 pb-12">
                                        <div className="p-8 bg-indigo-600 rotate-6 shadow-[0_0_80px_rgba(79,70,229,0.5)] animate-pulse"><GraduationCap className="w-24 h-24 text-white" /></div>
                                        <h3 className="text-[7rem] font-black tracking-tighter uppercase italic leading-none">The Academy Laws</h3>
                                    </div>

                                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
                                        <div className="bg-rose-500/20 p-16 border-4 border-rose-500 shadow-2xl col-span-full transform hover:-translate-y-4 transition-all rounded-none">
                                            <div className="flex items-center gap-12 mb-10 text-rose-500">
                                                <Ban className="w-24 h-24" />
                                                <h4 className="text-[6rem] font-black text-white uppercase tracking-tighter italic">LAW ZERO: NO CIRCLES</h4>
                                            </div>
                                            <p className="text-rose-100 text-5xl font-black italic leading-tight">"Curves are messy lies. We only believe in corners and sharp edges. If it curves, it isn't Bylogic."</p>
                                        </div>

                                        {[
                                            { id: '01', t: 'Square Rule', c: 'emerald', r: 'Side = P÷4 or √Area.', e: '20m fence garden = Side 5 = Area 25m².', icon: <Square /> },
                                            { id: '02', t: 'Turn Power', c: 'amber', r: 'Gaps = Turns - 1.', e: '10 Pillars hold exactly 9 segments.', icon: <MoveRight /> },
                                            { id: '03', t: 'Master Logic', c: 'indigo', r: 'Turns × Gaps.', e: '5 Turns × 4 Gaps = 20 Energy Power.', icon: <Target /> },
                                            { id: '04', t: 'Numeric Ads', c: 'orange', r: 'Doubling (2^X).', e: 'Shards grow: 2, 4, 8, 16, 32, 64...', icon: <Hash /> },
                                            { id: '05', t: 'Shard Combo', c: 'rose', r: 'Biggest Blocks First.', e: '14 Power = Blocks (8, 4, 2).', icon: <Boxes /> },
                                            { id: '06', t: 'Linear Speed', c: 'emerald', r: 'Accuracy / Time.', e: 'Fast correct logic beats slow math.', icon: <Rocket /> },
                                            { id: '07', t: 'Precision Protocol', c: 'amber', r: 'Exact Values Only.', e: 'Input logic must match perfectly.', icon: <ListChecks /> },
                                            { id: '08', t: 'Zero Tolerance', c: 'indigo', r: 'Fault Analysis.', e: 'Mistakes are mapped and corrected.', icon: <ShieldCheck /> }
                                        ].map(rule => (
                                            <div key={rule.id} className={`bg-${rule.c}-500/10 p-12 border-4 border-${rule.c}-500 shadow-xl rounded-none hover:scale-105 transition-all group`}>
                                                <div className="flex items-center gap-6 mb-8">
                                                    <div className="p-4 bg-white text-slate-900 group-hover:rotate-12 transition-transform">{rule.icon}</div>
                                                    <h4 className="text-4xl font-black text-white uppercase tracking-tighter italic leading-none">{rule.t}</h4>
                                                </div>
                                                <p className="text-white font-black opacity-80 mb-10 text-2xl italic leading-relaxed">{rule.r}</p>
                                                <div className="bg-black/60 p-8 border border-white/10 text-xl font-black text-white italic flex items-center gap-6 shadow-inner"><Compass className="w-10 h-10 text-white/40" /> {rule.e}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="space-y-12">
                                    <div className="flex items-center gap-6 mb-12"><Timer className="w-16 h-16 text-indigo-400" /><h3 className="text-7xl font-black tracking-tighter uppercase italic text-white">Enter Test</h3></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                                        {[
                                            { label: 'Sprint', count: 5, time: 60, icon: <Zap /> },
                                            { label: 'Blitz', count: 10, time: 300, icon: <Binary /> },
                                            { label: 'Logic Shift', count: 15, time: 900, icon: <Rocket /> },
                                            { label: 'Challenge', count: 20, time: 600, icon: <Cpu /> },
                                            { label: 'Marathon', count: 50, time: 1500, icon: <Trophy /> },
                                            { label: 'Legend', count: 100, time: 3600, icon: <ShieldCheck /> }
                                        ].map((opt, i) => (
                                            <button key={i} onClick={() => handleStart(opt.count, opt.time)} className="bg-white/5 border-4 border-white/10 p-12 text-left hover:bg-white/10 transition-all rounded-none group relative overflow-hidden">
                                                <div className="p-5 bg-indigo-600 w-fit mb-10 group-hover:scale-110 transition-transform">{opt.icon}</div>
                                                <h4 className="text-5xl font-black uppercase italic mb-6 leading-none">{opt.label}</h4>
                                                <div className="flex items-center gap-6 text-slate-400 font-black uppercase text-sm italic"><Clock className="w-6 h-6" /> {Math.floor(opt.time/60)} Min Challenge</div>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            </>
                        )}

                        {view === 'exam' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-20">
                                <div className="lg:col-span-8 space-y-24">
                                    {questions.map((q, i) => {
                                        const userVal = (userAnswers[q.id] || "").trim();
                                        const isDone = attempted[q.id];
                                        const isCorrect = userVal === q.a;
                                        return (
                                            <div key={i} id={`q-${q.id}`} className={`p-2 transition-all duration-700 shadow-2xl rounded-none ${isDone ? (isCorrect ? 'bg-emerald-500 shadow-[0_0_100px_rgba(16,185,129,0.4)]' : 'bg-rose-500 shadow-[0_0_100px_rgba(244,63,94,0.4)]') : `bg-white/10 hover:bg-white/15`}`}>
                                                <div className="bg-slate-900/95 p-16 h-full border border-white/10 shadow-inner relative overflow-hidden rounded-none">
                                                    <div className="flex justify-between mb-12 border-b border-white/5 pb-10 opacity-30">
                                                        <span className="text-sm font-black uppercase italic">{q.mode} ${i+1} • ${q.type}</span>
                                                        {isDone && (isCorrect ? <CheckCircle className="w-8 h-8"/> : <XCircle className="w-8 h-8"/>)}
                                                    </div>
                                                    {q.visual && <LogicDiagram turns={q.visual} theme={q.theme} />}
                                                    <p className="text-6xl font-black italic leading-[1.1] text-white tracking-tighter mb-16">{q.q}</p>
                                                    {q.mode === 'MCQ' ? (
                                                        <div className="grid md:grid-cols-2 gap-10">
                                                            {q.o.map((opt, oi) => {
                                                                const sel = userVal === opt.toString();
                                                                const corr = opt.toString() === q.a;
                                                                let style = "bg-white/5 border-4 border-white/10 hover:bg-white/10";
                                                                if (isDone) {
                                                                    if (corr) style = "bg-emerald-600 border-emerald-300 scale-[1.08] z-10 shadow-2xl";
                                                                    else if (sel) style = "bg-rose-700 border-rose-500 opacity-90 scale-95";
                                                                    else style = "opacity-10 grayscale blur-[2px]";
                                                                }
                                                                return <button key={oi} disabled={isDone} onClick={() => lockInAnswer(q.id, opt.toString())} className={`py-12 px-14 text-5xl font-black text-left transition-all rounded-none border-4 ${style}`}>{opt}</button>
                                                            })}
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-12">
                                                            <input 
                                                                type="text" disabled={isDone} value={userAnswers[q.id] || ""}
                                                                onChange={(e) => setUserAnswers(prev => ({...prev, [q.id]: e.target.value}))}
                                                                onKeyDown={(e) => e.key === 'Enter' && lockInAnswer(q.id, userAnswers[q.id])}
                                                                placeholder="Input logic shard..."
                                                                className={`w-full bg-white/5 border-b-[16px] p-16 text-[12rem] font-black outline-none transition-all rounded-none ${isDone ? (isCorrect ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400') : 'border-white/10 focus:border-indigo-500'}`}
                                                            />
                                                            {!isDone && <button onClick={() => lockInAnswer(q.id, userAnswers[q.id])} className="w-full bg-indigo-600 py-10 font-black uppercase italic text-4xl hover:bg-white hover:text-indigo-600 transition-all rounded-none">Verify Logic</button>}
                                                        </div>
                                                    )}
                                                    {isDone && !isCorrect && (
                                                        <div className="mt-16 p-20 bg-rose-500/10 border-4 border-rose-500/40 animate-in slide-in-from-top-10 rounded-none">
                                                            <div className="flex items-center gap-8 text-rose-400 mb-10 border-b border-rose-900/50 pb-8"><AlertCircle className="w-16 h-16" /><p className="text-4xl font-black uppercase tracking-[0.5em] italic">Correction Logic</p></div>
                                                            <p className="text-[7rem] font-black italic text-rose-100 mb-12">"Value: {q.a}"</p>
                                                            <p className="text-5xl text-white/50 font-black italic leading-tight">{q.hint}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })}
                                    <div className="text-center py-40"><button onClick={() => { setShowResults(true); setView('results'); window.scrollTo({top:0, behavior:'smooth'}); }} className="bg-white text-slate-950 px-52 py-20 text-[6rem] font-black uppercase italic shadow-[0_0_150px_rgba(255,255,255,0.4)] hover:scale-110 transition-all leading-none rounded-none flex items-center justify-center gap-16 mx-auto">Submit Audit <Trophy className="w-32 h-32" /></button></div>
                                </div>
                                <div className="lg:col-span-4 sticky top-48 h-fit space-y-12">
                                    <div className="bg-slate-900/90 backdrop-blur-3xl p-16 border-b-[40px] border-rose-600 shadow-[0_50px_100px_rgba(0,0,0,0.8)] border border-white/10 rounded-none">
                                        <div className="grid grid-cols-3 gap-6">
                                            {questions.map((qObj, idx) => {
                                                const done = attempted[qObj.id];
                                                const corr = userAnswers[qObj.id] === qObj.a;
                                                return <button key={idx} onClick={() => document.getElementById(`q-${qObj.id}`).scrollIntoView({behavior:'smooth', block:'center'})} className={`w-full aspect-square text-4xl font-black border-8 transition-all flex items-center justify-center rounded-none ${done ? (corr ? 'bg-emerald-500 border-emerald-400' : 'bg-rose-600 border-rose-400 animate-pulse') : 'bg-white/5 border-white/10'}`}>{idx+1}</button>
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="text-center py-40 animate-in zoom-in duration-1000 max-w-7xl mx-auto bg-slate-900 border-t-[80px] border-indigo-600 p-32 shadow-[0_0_300px_rgba(79,70,229,0.5)] rounded-none">
                                <div className="text-[30rem] mb-20 animate-bounce font-bold italic leading-none">{score >= (config.count * 0.8) ? '👑' : '⏳'}</div>
                                <h2 className="text-[10rem] font-black text-white mb-20 tracking-tighter uppercase italic leading-none">Audit Complete</h2>
                                <div className="grid grid-cols-2 gap-20 mb-32">
                                    <div className="bg-emerald-600 p-24 border-8 border-emerald-400 transform -rotate-3 hover:rotate-0 transition-all shadow-2xl"><p className="text-[18rem] font-black italic leading-none">{score}/{config.count}</p></div>
                                    <div className="bg-rose-600 p-24 border-8 border-rose-400 transform rotate-3 hover:rotate-0 transition-all shadow-2xl"><p className="text-[18rem] font-black italic leading-none">{mistakes.length}</p></div>
                                </div>
                                <button onClick={() => setView('menu')} className="w-full bg-white text-slate-950 py-24 text-[10rem] font-black uppercase italic hover:bg-indigo-500 hover:text-white transition-all rounded-none flex items-center justify-center gap-20"><RotateCcw className="w-40 h-40"/> Main Menu</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
